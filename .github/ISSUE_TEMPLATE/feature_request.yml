name: 💡 Feature request
description: Have a new idea/feature? Share it with our team!
title: '[Feature]: '
labels: ['Feature request']

body:
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched the [existing issues](https://github.com/unopim/unopim/issues?q=) and this feature has not already been requested.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of the problem. Ex. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: extrainfo
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
