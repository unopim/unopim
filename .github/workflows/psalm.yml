# Psalm security (taint) analysis — psalm-plugin-laravel.
# Psalm 6 runs type and taint analysis in separate modes; this workflow runs taint only.
# It uploads SARIF to Code Scanning and fails the run on any error-level taint finding that
# is not already suppressed by psalm-baseline.xml.

name: Psalm

on:
  push:
    branches: [ 2.1 ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: psalm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  taint-analysis:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Block unexpected egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Covers checkout, setup-php, Composer (public Packagist) and the SARIF upload.
          # Extend for other hosts (private registry, VCS repos). Use egress-policy: audit to discover them.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            results-receiver.actions.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # In taint mode Psalm exits 0 even on findings when writing a report, so CI is failed from the
      # SARIF below, not the exit code. The taint baseline (psalm-baseline.xml, via errorBaseline in
      # psalm.xml) suppresses current, reviewed findings so only NEW taint flows fail the build.
      - name: Run Psalm (taint analysis)
        run: ./vendor/bin/psalm --taint-analysis --report=psalm.sarif --report-show-info=false

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: psalm.sarif
          category: psalm-taint

      # Upload first so findings are recorded even on a failing run, then fail on any error-level finding.
      - name: Fail on Psalm taint findings
        run: |
          errors=$(jq '[.runs[].results[] | select(.level == "error")] | length' psalm.sarif)
          echo "Psalm taint findings: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "::error::Psalm reported $errors taint finding(s). See annotations on Files changed (maintainers: Security > Code scanning)."
            exit 1
          fi
