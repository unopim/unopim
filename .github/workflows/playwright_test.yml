name: Playwright Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  playwright_tests:
    name: Playwright E2E | Shard ${{ matrix.shard-index }}/${{ matrix.shard-total }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        shard-index: [1,2,3,4,5,6,7,8]
        shard-total: [8]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: unopim
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=600m
          --tmpfs /tmp:rw,noexec,nosuid,size=100m

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_INVALID_KEY: ${{ secrets.GROQ_INVALID_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      UNOPIM_URL: ${{ secrets.UNOPIM_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      INVALID_ADMIN_EMAIL: ${{ secrets.INVALID_ADMIN_EMAIL }}
      INVALID_ADMIN_PASSWORD: ${{ secrets.INVALID_ADMIN_PASSWORD }}
      # E2E only: lets webhook-delivery.spec.js point UnoPim at a localhost
      # catcher (127.0.0.1:<port>). SafeWebhookUrl blocks loopback by default
      # in prod; this flag re-allows loopback ONLY — private / link-local /
      # multicast / reserved IP ranges stay blocked.
      WEBHOOK_ALLOW_LOOPBACK: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--optimize-autoloader"

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: tests/e2e-pw/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('tests/e2e-pw/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e-pw/package-lock.json') }}

      - name: Install npm & Playwright browsers
        run: |
          cd tests/e2e-pw
          npm install --no-progress --prefer-offline
          npx playwright install --with-deps chromium

      - name: Setting Environment
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(APP_DEBUG=\s*\).*$|\1false|" .env
          sed -i "s|^\(APP_URL=\s*\).*$|\1http://127.0.0.1:8000|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\13306|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1root|" .env
          # The API E2E specs fire many requests back-to-back; lift the REST rate
          # limit for the test server so they don't trip the 120/min throttle (429).
          echo "REST_API_RATE_LIMIT=100000" >> .env
          # Login-heavy shards (loginpage, notifications re-auth, ajax-nav, security)
          # sign in as the same admin many times within a minute; raise the admin
          # login throttle so those legitimate logins don't cascade into 429s. The
          # rate-limit security spec reads this same value to still assert throttling.
          echo "ADMIN_LOGIN_RATE_LIMIT=20" >> .env

          # The webhook-delivery spec's catcher listens on the runner's loopback;
          # SafeWebhookUrl blocks loopback unless this opt-in is set.
          echo "WEBHOOK_ALLOW_LOOPBACK=true" >> .env

      - name: Running UnoPim Installer & Start Server
        env:
          # Fall back to the same literal creds login.js defaults to, so the
          # seeded admin always matches the test login even when these repo
          # secrets are unset (e.g. fork PRs, where secrets are unavailable).
          # Without a fallback the seeder generates a RANDOM password and every
          # login — and thus every E2E test — fails.
          INSTALLER_ADMIN_EMAIL: ${{ secrets.INSTALLER_ADMIN_EMAIL || 'admin@example.com' }}
          INSTALLER_ADMIN_PASSWORD: ${{ secrets.INSTALLER_ADMIN_PASSWORD || 'admin123' }}
        run: |
          php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data
          chmod 0600 packages/Webkul/AdminApi/src/Secrets/Oauth/oauth-*.key
          php artisan serve --host=0.0.0.0 --port=8000 > /tmp/server.log 2>&1 &
          php artisan queue:work --queue=webhooks,default,system,completeness,publication > /tmp/queue.log 2>&1 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done' || (cat /tmp/server.log && exit 1)

      - name: Run Playwright tests
        run: |
          cd tests/e2e-pw
          npx playwright test --reporter=list,html --shard=${{ matrix.shard-index }}/${{ matrix.shard-total }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard-index }}-${{ github.run_id }}
          path: |
            tests/e2e-pw/playwright-report
            tests/e2e-pw/test-results
            storage/logs/laravel.log
          retention-days: 1
