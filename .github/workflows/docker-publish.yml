name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g., 2.0.1)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          # Strip 'v' prefix if present (v2.0.1 -> 2.0.1)
          VERSION="${TAG#v}"
          MINOR="${VERSION%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/web.Dockerfile
          push: true
          tags: |
            webkul/unopim:${{ steps.version.outputs.version }}
            webkul/unopim:${{ steps.version.outputs.minor }}
            webkul/unopim:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push queue worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/q.Dockerfile
          push: true
          tags: |
            webkul/unopim-queue:${{ steps.version.outputs.version }}
            webkul/unopim-queue:${{ steps.version.outputs.minor }}
            webkul/unopim-queue:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: webkul/unopim
          short-description: "UnoPim — Open Source Product Information Management"
          readme-filepath: ./README.md
