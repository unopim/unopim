name: Pest Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pest:
    runs-on: ubuntu-24.04
    name: Pest Tests (MySQL)

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: unopim
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=600m
          --tmpfs /tmp:rw,noexec,nosuid,size=100m

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--optimize-autoloader"

      - name: Setting Environment
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\13306|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PREFIX=\s*\).*$|\1wk_|" .env

      - name: Running UnoPim Installer
        run: php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data

      - name: Set Passport OAuth key permissions
        run: chmod 0600 packages/Webkul/AdminApi/src/Secrets/Oauth/oauth-*.key

      - name: Running Pest Tests
        run: |
          # Run heavy suites in separate PHP processes so memory is released
          # between them. The full suite in a single process peaked past the
          # runner memory limit and was OOM-killed (exit 137).
          vendor/bin/pest --testsuite "Admin Feature Test" --colors=always
          vendor/bin/pest --testsuite "Api Feature Test,DataTransfer Unit Test" --colors=always
          vendor/bin/pest --exclude-testsuite "Admin Feature Test,Api Feature Test,DataTransfer Unit Test" --colors=always

  pest-elasticsearch:
    runs-on: ubuntu-24.04
    name: Pest Tests (MySQL + Elasticsearch)

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: unopim
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=3
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=600m
          --tmpfs /tmp:rw,noexec,nosuid,size=100m

      elasticsearch:
        image: elasticsearch:8.17.0
        env:
          discovery.type: single-node
          xpack.security.enabled: 'false'
          ES_JAVA_OPTS: '-Xms256m -Xmx256m'
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--optimize-autoloader"

      - name: Setting Environment
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\13306|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1unopim|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1root|" .env

      - name: Running UnoPim Installer
        run: php artisan unopim:install --skip-env-check --skip-admin-creation --with-demo-data

      - name: Enable Elasticsearch and build indexes
        run: |
          sed -i "s|^\(ELASTICSEARCH_ENABLED=\s*\).*$|\1true|" .env
          sed -i "s|^\(ELASTICSEARCH_HOST=\s*\).*$|\1http://127.0.0.1:9200|" .env
          sed -i "s|^\(ELASTICSEARCH_INDEX_PREFIX=\s*\).*$|\1unopim_test|" .env
          php artisan config:clear
          curl -s http://127.0.0.1:9200/_cluster/health | python3 -m json.tool
          php artisan unopim:product:index
          php artisan unopim:category:index

      - name: Set Passport OAuth key permissions
        run: chmod 0600 packages/Webkul/AdminApi/src/Secrets/Oauth/oauth-*.key

      - name: Running Pest Tests
        run: |
          # Run heavy suites in separate PHP processes so memory is released
          # between them. The full suite in a single process peaked past the
          # runner memory limit and was OOM-killed (exit 137).
          vendor/bin/pest --testsuite "Admin Feature Test" --colors=always
          vendor/bin/pest --testsuite "Api Feature Test,DataTransfer Unit Test" --colors=always
          vendor/bin/pest --exclude-testsuite "Admin Feature Test,Api Feature Test,DataTransfer Unit Test" --colors=always
