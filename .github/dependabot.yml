# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Composer (PHP) — backend deps
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "illuminate/*"
      symfony:
        patterns:
          - "symfony/*"
      dev-dependencies:
        dependency-type: "development"

  # npm — Playwright e2e tests
  - package-ecosystem: "npm"
    directory: "/tests/e2e-pw"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "e2e"
    commit-message:
      prefix: "chore(deps-e2e)"
      include: "scope"
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
