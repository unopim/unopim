# =============================================================================
# UnoPim Docker Compose — Multi-Container Setup
# =============================================================================
#
# Services:
#   unopim-web          — Apache + PHP 8.3 (application server)
#   unopim-q            — Queue worker (system, completeness, default)
#   unopim-scheduler    — Laravel scheduler (cron replacement)
#   unopim-mysql        — MySQL 8.0 (database)
#   unopim-redis        — Redis 7.2 (cache + queue backend)
#   unopim-elasticsearch — Elasticsearch 8.17 (product search)
#   unopim-mailpit      — Mailpit (local email testing)
#
# Quick start:
#   cp .env.docker .env
#   docker compose up -d
#   # Wait ~60s for first-time setup, then open http://localhost:8000/admin
#
# Port conflicts? Override FORWARD_* variables in .env:
#   FORWARD_DB_PORT=3307  FORWARD_REDIS_PORT=6380  FORWARD_ES_PORT=9201
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Server (Apache + PHP 8.3)
  # ---------------------------------------------------------------------------
  unopim-web:
    build:
      context: .
      dockerfile: dockerfiles/web.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-web
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-8000}:80"
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: unopim-mysql
      DB_PORT: 3306
      REDIS_HOST: unopim-redis
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: unopim-elasticsearch:9200
      MAIL_HOST: unopim-mailpit
      MAIL_PORT: 1025
    depends_on:
      unopim-mysql:
        condition: service_healthy
      unopim-redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Queue Worker
  # ---------------------------------------------------------------------------
  unopim-q:
    build:
      context: .
      dockerfile: dockerfiles/q.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-q
    volumes:
      - .:/var/www/html
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: unopim-mysql
      DB_PORT: 3306
      REDIS_HOST: unopim-redis
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: unopim-elasticsearch:9200
      QUEUE_NAMES: "system,completeness,default"
    depends_on:
      unopim-mysql:
        condition: service_healthy
      unopim-redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Scheduler (Laravel cron — runs schedule:work)
  # ---------------------------------------------------------------------------
  unopim-scheduler:
    build:
      context: .
      dockerfile: dockerfiles/q.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-scheduler
    volumes:
      - .:/var/www/html
    restart: unless-stopped
    entrypoint: ["/var/www/html/dockerfiles/scheduler-entrypoint.sh"]
    env_file: .env
    environment:
      DB_HOST: unopim-mysql
      DB_PORT: 3306
      REDIS_HOST: unopim-redis
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: unopim-elasticsearch:9200
    depends_on:
      unopim-mysql:
        condition: service_healthy
      unopim-redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ---------------------------------------------------------------------------
  # MySQL 8.0
  # ---------------------------------------------------------------------------
  unopim-mysql:
    image: mysql:8.0.36-debian
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-mysql
    volumes:
      - unopim-mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${FORWARD_DB_PORT:-3306}:3306"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_DATABASE:-unopim}
      MYSQL_USER: ${DB_USERNAME:-unopim}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --log-bin-trust-function-creators=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7.2 (cache + queue backend)
  # ---------------------------------------------------------------------------
  unopim-redis:
    image: redis:7.2-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - unopim-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ---------------------------------------------------------------------------
  # Elasticsearch 8.17 (product + category search)
  # ---------------------------------------------------------------------------
  unopim-elasticsearch:
    image: elasticsearch:8.17.0
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - unopim-elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:${FORWARD_ES_PORT:-9200}:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Mailpit (local SMTP + web UI for email testing)
  # ---------------------------------------------------------------------------
  unopim-mailpit:
    image: axllent/mailpit:v1.21
    container_name: ${COMPOSE_PROJECT_NAME:-unopim}-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_MAILPIT_PORT:-8025}:8025"
      - "127.0.0.1:${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  unopim-mysql-data:
  unopim-redis-data:
  unopim-elasticsearch-data:
