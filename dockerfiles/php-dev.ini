; =============================================================================
; UnoPim PHP Configuration — local development overrides
; =============================================================================
; Mounted by docker-compose.yml into conf.d AFTER unopim.ini, so these win.
; Never baked into an image: published containers keep php.ini's production
; settings. The source tree is bind-mounted, so any cached opcode is stale the
; moment a file is edited on the host.

opcache.enable = 0
opcache.enable_cli = 0
