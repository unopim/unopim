server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # ─── File Uploads (PIM handles large CSV/XLSX imports) ──────────
    client_max_body_size 200M;
    client_body_timeout 600s;

    # ─── Gzip Compression ──────────────────────────────────────────
    gzip on;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    gzip_min_length 512;
    gzip_comp_level 6;
    gzip_vary on;

    # ─── Static Files (served directly by Nginx) ──────────────────
    location ~* \.(jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf|eot|css|js|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Laravel Front Controller ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM Handler ──────────────────────────────────────────
    location ~ ^/index\.php(/|$) {
        fastcgi_pass unopim-fpm:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Prevent httpoxy vulnerability
        fastcgi_param HTTP_PROXY "";

        # Forward client info to PHP (required for url(), secure(), trusted proxies)
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;

        # Buffers for large API responses (product listings, export data)
        fastcgi_buffers 32 32k;
        fastcgi_buffer_size 128k;
        fastcgi_busy_buffers_size 256k;

        # Timeout for long-running requests (imports, exports, bulk ops)
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;

        internal;
    }

    # ─── Security ─────────────────────────────────────────────────
    # Deny direct PHP execution (only index.php is allowed)
    location ~ \.php$ {
        return 404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }

    # ─── Logging ──────────────────────────────────────────────────
    access_log /dev/stdout;
    error_log /dev/stderr notice;
}
