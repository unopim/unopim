; =============================================================================
; UnoPim PHP-FPM Pool Configuration
; =============================================================================
; Tuned for PIM workloads: bulk imports, API requests, background jobs.
; Override via environment variables in docker-compose.yml.
; =============================================================================

[www]
user = www-data
group = www-data

listen = 9000

; Process management
; dynamic: spawns/kills workers based on load
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6

; Restart workers after N requests to prevent memory leaks
pm.max_requests = 500

; Pass environment variables to PHP workers (required for env_file in compose)
clear_env = no

; Logging
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
